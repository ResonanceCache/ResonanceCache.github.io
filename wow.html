<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Williamson | Space Infrastructure & Identity</title>
    <style>
        :root {
            --bg: #05070a;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.2);
            --text: #e0e6ed;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Hero Text */
        .hero-text {
            position: absolute;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .hero-text h1 {
            font-size: 3rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin: 0;
            font-weight: 200;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 0.9rem;
            color: var(--accent);
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            margin-top: 1rem;
            opacity: 0.8;
        }

        /* Orbital Paths */
        .orbit {
            position: absolute;
            border: 1px solid var(--accent-dim);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate linear infinite;
        }

        .orbit-1 { width: 300px; height: 300px; animation-duration: 20s; }
        .orbit-2 { width: 500px; height: 500px; animation-duration: 35s; animation-direction: reverse; }
        .orbit-3 { width: 750px; height: 750px; animation-duration: 50s; }

        /* The Nodes (Satellites) */
        .node {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
            cursor: pointer;
            pointer-events: all;
        }

        /* Specific Node Placements */
        .node-autonomy { top: -6px; }
        .node-payments { left: -6px; }
        .node-space { right: -6px; }

        .label {
            position: absolute;
            white-space: nowrap;
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            color: var(--text);
            opacity: 0;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }

        .node:hover .label {
            opacity: 1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Scanline Effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 242, 255, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        /* Identity Core Pulse */
        .core {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <div class="core"></div>
        
        <div class="hero-text">
            <h1>Williamson</h1>
            <p>Architect of Infrastructure</p>
        </div>

        <!-- Inner Orbit: Origins -->
        <div class="orbit orbit-1">
            <div class="node node-autonomy">
                <div class="label" style="top: -20px; left: 20px;">Autonomy & Defense</div>
            </div>
        </div>

        <!-- Middle Orbit: Rails -->
        <div class="orbit orbit-2">
            <div class="node node-payments">
                <div class="label" style="left: 20px; top: 10px;">Global Payment Rails</div>
            </div>
        </div>

        <!-- Outer Orbit: Future -->
        <div class="orbit orbit-3">
            <div class="node node-space">
                <div class="label" style="right: 20px; top: 10px;">Space Identity (Kuiper)</div>
            </div>
        </div>
    </div>
</body>
</html>
